# documentation: https://docs.powersync.com?utm_source=coolify.io
# slogan: Sync engine for local-first apps with Postgres, MySQL, MongoDB, or SQL Server.
# tags: sync, sync-engine, local-first, offline-first, postgres, realtime, sqlite, mobile, replication
# logo: svgs/powersync.svg
# port: 6060

services:
  powersync:
    image: 'journeyapps/powersync-service:latest'
    environment:
      # Coolify generates a public FQDN for the sync endpoint on port 6060
      - SERVICE_FQDN_POWERSYNC_6060
      # Internal service ports
      - 'PS_PORT=6060'
      - 'PS_TELEMETRY_PORT=9090'
      # Source database connection (replication source)
      # Format: postgresql://user:password@hostname:5432/dbname
      # If connecting to another Coolify service, enable "Connect To Predefined Network"
      # on BOTH services, then use the container name as the hostname.
      - 'PS_DATABASE_TYPE=${PS_DATABASE_TYPE:-postgresql}'
      - 'PS_DATABASE_URI=${PS_DATABASE_URI}'
      # Sync bucket storage (PowerSync's internal state — can be the same database)
      - 'PS_SYNC_BUCKET_TYPE=${PS_SYNC_BUCKET_TYPE:-postgresql}'
      - 'PS_SYNC_BUCKET_URI=${PS_SYNC_BUCKET_URI}'
      # SSL mode for database connections (default: disable)
      - 'PS_SSLMODE=${PS_SSLMODE:-disable}'
      # Admin API token (auto-generated by Coolify)
      - 'PS_API_TOKEN=${SERVICE_PASSWORD_APITOKEN}'
      # JWKS endpoint for verifying client JWTs (e.g. Supabase Auth)
      # Example: http://supabasekong-<id>:8000/auth/v1/.well-known/jwks.json
      - 'PS_JWKS_URL=${PS_JWKS_URL}'
    volumes:
      # PowerSync service configuration
      - type: bind
        source: ./powersync.yaml
        target: /app/powersync.yaml
        content: |
          port: !env PS_PORT

          replication:
            connections:
              - type: !env PS_DATABASE_TYPE
                uri: !env PS_DATABASE_URI
                sslmode: !env PS_SSLMODE

          storage:
            type: !env PS_SYNC_BUCKET_TYPE
            uri: !env PS_SYNC_BUCKET_URI
            sslmode: !env PS_SSLMODE

          # Sync streams loaded from file on startup.
          # Remove this section to manage sync streams via the API or CI/CD instead.
          sync_config:
            path: /app/sync-config.yaml

          client_auth:
            jwks_uri: !env PS_JWKS_URL
            audience: ['powersync-dev', 'powersync', 'authenticated']

          api:
            tokens:
              - !env PS_API_TOKEN

          telemetry:
            disable_telemetry_sharing: true
            prometheus_port: !env PS_TELEMETRY_PORT
      # Sync streams — edit this in the Coolify UI under Storages > Files.
      # Replace the example queries below with your own tables.
      # Docs: https://docs.powersync.com/sync/streams/overview
      - type: bind
        source: ./sync-config.yaml
        target: /app/sync-config.yaml
        content: |
          # https://docs.powersync.com/sync/advanced/compatibility
          config:
            edition: 3

          # IMPORTANT: Replace these examples with your actual tables.
          # The examples below will produce replication warnings until you
          # update them and create the required publication on your database:
          #   CREATE PUBLICATION powersync FOR ALL TABLES;
          streams:
            global:
              auto_subscribe: true
              queries:
                - SELECT * FROM mytable
                # - SELECT * FROM "%"   # Wildcard: sync all tables (dev only)

            by_user:
              auto_subscribe: true
              query: SELECT * FROM mytable WHERE mytable.user_id = auth.user_id()
    healthcheck:
      test:
        - CMD
        - wget
        - '-q'
        - '--spider'
        - 'http://127.0.0.1:6060/probes/liveness'
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
